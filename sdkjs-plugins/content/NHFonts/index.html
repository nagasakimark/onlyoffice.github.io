<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
<style>
* { box-sizing: border-box; }
html, body { width: 100%; min-height: 100px; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 10px; background: #fff; }
h3 { margin: 0 0 8px 0; font-size: 14px; }
textarea { width: 100%; height: 80px; margin-bottom: 6px; padding: 4px; }
select { width: 100%; margin-bottom: 6px; padding: 4px; }
button { width: 100%; padding: 6px; cursor: pointer; }
#status { margin-top: 6px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<h3>NH Fonts Plugin</h3>
<textarea id="text">Write here...</textarea>
<select id="font">
  <option value="NH1">NHHandwriting</option>
  <option value="NH2">NHHandwriting RL</option>
  <option value="NH3">NHHandwriting RL TW Light</option>
</select>
<button onclick="insert()">Insert</button>
<div id="status"></div>

<canvas id="measureCanvas" style="display:none;"></canvas>

<script src="pluginCode.js"></script>

<script>
// Cache fetched font base64 so we don't re-download on every insert
var fontCache = {};

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function arrayBufferToBase64(buffer) {
  var binary = "";
  var bytes = new Uint8Array(buffer);
  for (var i = 0; i < bytes.byteLength; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function getFontBase64(fontUrl) {
  if (fontCache[fontUrl]) {
    return Promise.resolve(fontCache[fontUrl]);
  }
  return fetch(fontUrl)
    .then(function(res) {
      if (!res.ok) throw new Error("Font fetch failed: " + res.status);
      return res.arrayBuffer();
    })
    .then(function(buffer) {
      var b64 = arrayBufferToBase64(buffer);
      fontCache[fontUrl] = b64;
      return b64;
    });
}

function measureTextWidth(text, fontName, fontSize) {
  var canvas = document.getElementById("measureCanvas");
  var ctx = canvas.getContext("2d");
  // Use a fallback font for measurement — close enough for sizing
  ctx.font = fontSize + "px serif";
  return ctx.measureText(text).width;
}

function insert() {
  var text = document.getElementById("text").value;
  var font = document.getElementById("font").value;
  var fontFile = font === "NH1" ? "1.ttf" : font === "NH2" ? "2.ttf" : "3.ttf";
  var fontUrl = "https://nagasakimark.github.io/office/" + fontFile;

  setStatus("Loading font...");

  getFontBase64(fontUrl).then(function(fontB64) {
    setStatus("Building SVG...");

    var fontSize = 40;
    var lineHeight = fontSize * 1.3;
    var paddingX = 6;
    var paddingY = 6;

    // Split text into lines
    var lines = text.split("\n");
    var numLines = lines.length;

    // Rough width estimate using canvas with fallback font
    var maxWidth = 0;
    lines.forEach(function(line) {
      var w = measureTextWidth(line, font, fontSize);
      if (w > maxWidth) maxWidth = w;
    });
    // Add generous padding since our measurement uses a fallback font
    var svgWidth  = Math.ceil(maxWidth) + paddingX * 2 + 40;
    var svgHeight = Math.ceil(numLines * lineHeight) + paddingY * 2;

    // Build <text> elements, one per line
    var textElements = lines.map(function(line, i) {
      var y = paddingY + fontSize + i * lineHeight;
      // Escape XML special characters
      var safe = line
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
      return '<text x="' + paddingX + '" y="' + y + '">' + safe + '</text>';
    }).join("\n  ");

    var svg = [
      '<svg xmlns="http://www.w3.org/2000/svg"',
      '     width="' + svgWidth + '" height="' + svgHeight + '"',
      '     viewBox="0 0 ' + svgWidth + ' ' + svgHeight + '">',
      '  <defs>',
      '    <style>',
      '      @font-face {',
      '        font-family: "' + font + '";',
      '        src: url("data:font/truetype;base64,' + fontB64 + '");',
      '      }',
      '      text {',
      '        font-family: "' + font + '", serif;',
      '        font-size: ' + fontSize + 'px;',
      '        fill: #000000;',
      '      }',
      '    </style>',
      '  </defs>',
      '  ' + textElements,
      '</svg>'
    ].join("\n");

    // Encode entire SVG as a base64 data URI
    var svgB64 = btoa(unescape(encodeURIComponent(svg)));
    var svgDataUrl = "data:image/svg+xml;base64," + svgB64;

    // Convert px to EMU (1px at 96dpi = 9525 EMU)
    var emuW = Math.round(svgWidth  * 9525);
    var emuH = Math.round(svgHeight * 9525);

    setStatus("Inserting...");

    Asc.scope.imgSrc = svgDataUrl;
    Asc.scope.emuW   = emuW;
    Asc.scope.emuH   = emuH;

    window.Asc.plugin.callCommand(function() {
      var oDocument = Api.GetDocument();
      var oImage = Api.CreateImage(Asc.scope.imgSrc, Asc.scope.emuW, Asc.scope.emuH);

      // Set wrapping to "infront" so it floats over text without affecting layout
      oImage.SetWrappingStyle("infront");

      // Position it at the current cursor location approximately
      // by inserting into a new inline paragraph first to anchor it,
      // then the infront wrapping lifts it above the text flow
      var oParagraph = Api.CreateParagraph();
      oParagraph.AddDrawing(oImage);
      oDocument.InsertContent([oParagraph]);
    }, false, false, function(err) {
      if (err) {
        console.error("callCommand error:", err);
        setStatus("Error: " + JSON.stringify(err));
      } else {
        setStatus("Done.");
      }
    });

  }).catch(function(err) {
    setStatus("Failed: " + err.message);
    console.error(err);
  });
}
</script>
</body>
</html>
