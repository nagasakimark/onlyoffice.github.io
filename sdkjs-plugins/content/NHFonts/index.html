<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@font-face {
  font-family: NH1;
  src: url("https://nagasakimark.github.io/office/1.ttf");
}
@font-face {
  font-family: NH2;
  src: url("https://nagasakimark.github.io/office/2.ttf");
}
@font-face {
  font-family: NH3;
  src: url("https://nagasakimark.github.io/office/3.ttf");
}

body {
  font-family: sans-serif;
  padding: 10px;
}

textarea {
  width: 100%;
  height: 100px;
  font-size: 20px;
}

.preview {
  margin-top: 10px;
  border: 1px solid #ccc;
  padding: 10px;
  min-height: 50px;
}

select, button {
  margin-top: 10px;
  width: 100%;
}
</style>
</head>

<body>

<h3>NH Fonts</h3>

<textarea id="text">Write here...</textarea>

<select id="font">
  <option value="NH1">NHHandwriting</option>
  <option value="NH2">NHHandwriting RL</option>
  <option value="NH3">NHHandwriting RL TW Light</option>
</select>

<div class="preview" id="preview"></div>

<button onclick="insert()">Insert into document</button>

<script>
const textEl = document.getElementById("text");
const fontEl = document.getElementById("font");
const preview = document.getElementById("preview");

function updatePreview() {
  preview.style.fontFamily = fontEl.value;
  preview.innerText = textEl.value;
}

textEl.oninput = updatePreview;
fontEl.onchange = updatePreview;
updatePreview();

function makeSVG(text, font) {
  const file =
    font === "NH1" ? "1.ttf" :
    font === "NH2" ? "2.ttf" : "3.ttf";

  return `
<svg xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face {
      font-family: ${font};
      src: url("https://nagasakimark.github.io/office/${file}");
    }
    text {
      font-family: ${font};
      font-size: 24px;
    }
  </style>
  <text x="10" y="40">${text}</text>
</svg>`;
}

function insert() {
  const text = textEl.value;
  const font = fontEl.value;
  const svg = makeSVG(text, font);

  window.Asc.plugin.executeMethod("PasteHtml", [svg]);
}
</script>

<script src="pluginCode.js"></script>

</body>
</html>
