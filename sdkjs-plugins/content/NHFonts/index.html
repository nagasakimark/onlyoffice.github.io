<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
<style>
* { box-sizing: border-box; }
html, body { width: 100%; min-height: 100px; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 10px; background: #fff; }
h3 { margin: 0 0 8px 0; font-size: 14px; }
textarea { width: 100%; height: 80px; margin-bottom: 6px; padding: 4px; }
select { width: 100%; margin-bottom: 6px; padding: 4px; }
button { width: 100%; padding: 6px; cursor: pointer; }
#status { margin-top: 6px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<h3>NH Fonts Plugin</h3>
<textarea id="text">Write here...</textarea>
<select id="font">
  <option value="NH1">NHHandwriting</option>
  <option value="NH2">NHHandwriting RL</option>
  <option value="NH3">NHHandwriting RL TW Light</option>
</select>
<button onclick="insert()">Insert</button>
<div id="status"></div>

<canvas id="renderCanvas" style="display:none;"></canvas>

<script src="pluginCode.js"></script>

<script>
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function insert() {
  var text = document.getElementById("text").value;
  var font = document.getElementById("font").value;
  var fontFile = font === "NH1" ? "1.ttf" : font === "NH2" ? "2.ttf" : "3.ttf";
  var fontUrl = "https://nagasakimark.github.io/office/" + fontFile;

  setStatus("Loading font...");

  var face = new FontFace(font, "url(" + fontUrl + ")");
  face.load().then(function(loadedFace) {
    document.fonts.add(loadedFace);
    setStatus("Rendering...");

    var fontSize = 32;
    var padding = 10;

    // Measure text width
    var temp = document.createElement("canvas");
    var tempCtx = temp.getContext("2d");
    tempCtx.font = fontSize + "px \"" + font + "\"";
    var textWidth = tempCtx.measureText(text).width;

    var canvasW = Math.ceil(textWidth) + padding * 2;
    var canvasH = fontSize + padding * 2;

    var canvas = document.getElementById("renderCanvas");
    canvas.width  = canvasW;
    canvas.height = canvasH;
    var ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = "#000000";
    ctx.font = fontSize + "px \"" + font + "\"";
    ctx.textBaseline = "top";
    ctx.fillText(text, padding, padding);

    var dataUrl = canvas.toDataURL("image/png");

    // Convert px to EMU: 1px at 96dpi = 9525 EMU
    var emuW = Math.round(canvasW * 9525);
    var emuH = Math.round(canvasH * 9525);

    setStatus("Inserting...");

    // Pass data to callCommand via Asc.scope
    Asc.scope.imgSrc = dataUrl;
    Asc.scope.emuW   = emuW;
    Asc.scope.emuH   = emuH;

    window.Asc.plugin.callCommand(function() {
      var oDocument = Api.GetDocument();
      var oParagraph = Api.CreateParagraph();
      var oImage = Api.CreateImage(Asc.scope.imgSrc, Asc.scope.emuW, Asc.scope.emuH);
      oParagraph.AddDrawing(oImage);
      oDocument.InsertContent([oParagraph]);
    }, false, false, function(err) {
      if (err) {
        console.error("callCommand error:", err);
        setStatus("Error: " + JSON.stringify(err));
      } else {
        setStatus("Done.");
      }
    });

  }).catch(function(err) {
    setStatus("Font load failed: " + err.message);
    console.error(err);
  });
}
</script>
</body>
</html>
