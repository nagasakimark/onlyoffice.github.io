<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
<style>
* { box-sizing: border-box; }
html, body { width: 100%; min-height: 100px; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 10px; background: #fff; }
h3 { margin: 0 0 8px 0; font-size: 14px; }
textarea { width: 100%; height: 80px; margin-bottom: 6px; padding: 4px; }
select { width: 100%; margin-bottom: 6px; padding: 4px; }
button { width: 100%; padding: 6px; cursor: pointer; }
#status { margin-top: 6px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<h3>NH Fonts Plugin</h3>
<textarea id="text">Write here...</textarea>
<select id="font">
  <option value="NH1">NHHandwriting</option>
  <option value="NH2">NHHandwriting RL</option>
  <option value="NH3">NHHandwriting RL TW Light</option>
</select>
<button onclick="insert()">Insert</button>
<div id="status"></div>

<!-- hidden canvas for rendering -->
<canvas id="renderCanvas" style="display:none;"></canvas>

<script src="pluginCode.js"></script>

<script>
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function insert() {
  var text = document.getElementById("text").value;
  var font = document.getElementById("font").value;
  var fontFile = font === "NH1" ? "1.ttf" : font === "NH2" ? "2.ttf" : "3.ttf";
  var fontUrl = "https://nagasakimark.github.io/office/" + fontFile;

  setStatus("Loading font...");

  var face = new FontFace(font, "url(" + fontUrl + ")");
  face.load().then(function(loadedFace) {
    document.fonts.add(loadedFace);
    setStatus("Rendering...");

    var fontSize = 32;
    var padding = 10;

    // Measure on a temp canvas
    var temp = document.createElement("canvas");
    var tempCtx = temp.getContext("2d");
    tempCtx.font = fontSize + "px \"" + font + "\"";
    var metrics = tempCtx.measureText(text);
    var textWidth = metrics.width;

    // Use the persistent canvas element
    var canvas = document.getElementById("renderCanvas");
    canvas.width  = Math.ceil(textWidth) + padding * 2;
    canvas.height = fontSize + padding * 2;
    var ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#000000";
    ctx.font = fontSize + "px \"" + font + "\"";
    ctx.textBaseline = "top";
    ctx.fillText(text, padding, padding);

    var dataUrl = canvas.toDataURL("image/png");

    // Log so we can verify the data URL is valid
    console.log("dataUrl length:", dataUrl.length);
    console.log("dataUrl prefix:", dataUrl.substring(0, 60));

    setStatus("Inserting...");

    // Try method 1: InsertImage with just the data URL string
    try {
      window.Asc.plugin.executeMethod("InsertImage", [dataUrl], function(err) {
        if (err) {
          console.warn("InsertImage string failed:", err);
          tryPasteHtml(dataUrl, canvas.width, canvas.height);
        } else {
          setStatus("Done.");
        }
      });
    } catch(e) {
      console.warn("InsertImage threw:", e);
      tryPasteHtml(dataUrl, canvas.width, canvas.height);
    }

  }).catch(function(err) {
    setStatus("Font load failed: " + err.message);
    console.error(err);
  });
}

function tryPasteHtml(dataUrl, w, h) {
  // Method 2: paste an <img> tag with the embedded PNG data URL
  // ONLYOFFICE will convert the inline image when pasting HTML
  var html = '<img src="' + dataUrl + '" width="' + w + '" height="' + h + '">';
  console.log("Trying PasteHtml with img tag, html length:", html.length);
  try {
    window.Asc.plugin.executeMethod("PasteHtml", [html], function(err) {
      if (err) {
        console.warn("PasteHtml img failed:", err);
        setStatus("Insert failed. Check console.");
      } else {
        setStatus("Done.");
      }
    });
  } catch(e) {
    console.error("PasteHtml threw:", e);
    setStatus("Insert failed. Check console.");
  }
}
</script>
</body>
</html>
